<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Akashic EIS — Pipeline</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .pl-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
  .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
  .kcol{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
  .kcol-head{padding:11px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
  .kcol-head b{font-size:12.5px}.kcol-head .kv{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
  .kcol-body{padding:10px;display:flex;flex-direction:column;gap:10px;min-height:60px}
  .pcard{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r);padding:12px 13px;box-shadow:var(--shadow-sm);cursor:pointer;transition:all .12s;border-top:3px solid var(--accent)}
  .pcard:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .pcard.t-Renewal{border-top-color:var(--composite)}
  .pcard.t-Expansion{border-top-color:var(--good)}
  .pcard.t-NewLogo{border-top-color:var(--accent)}
  .pc-name{font-size:13px;font-weight:700;line-height:1.3}
  .pc-meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
  .pc-val{font-size:15px;font-weight:800;letter-spacing:-.02em}
  .pc-prob{font-size:10.5px;font-family:var(--mono);font-weight:700;padding:1px 7px;border-radius:5px}
  .pc-prob.hi{background:var(--good-soft);color:var(--good)}.pc-prob.md{background:var(--warn-soft);color:var(--warn)}.pc-prob.lo{background:var(--critical-soft);color:var(--critical)}
  .pc-foot{display:flex;align-items:center;gap:7px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-3)}
  .pc-next{font-size:11px;color:var(--ink-2);margin-top:8px;line-height:1.4;background:var(--surface-2);padding:6px 8px;border-radius:6px}
  .ptype{font-size:9.5px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;padding:1px 6px;border-radius:4px;background:var(--surface-3);color:var(--ink-3)}
</style>
</head>
<body data-screen="pipeline" data-persona="ceo" data-crumb="Pillars / Pipeline">
<div class="layout">
  <aside id="sidebar"></aside>
  <div class="main-wrap">
    <header id="topbar"></header>
    <main class="content wide" data-screen-label="Pipeline — pursuits">

      <div class="page-head">
        <div class="head-row">
          <div>
            <div class="page-eyebrow">Spine node · Pursuit</div>
            <h1 class="page-title">Pipeline</h1>
            <div class="page-sub" style="max-width:680px">The Pursuit vertebra now has a screen behind it. Pursuits by stage, value and probability — feeding the coverage metric on your home pulse and the renewal SOWs that protect at-risk accounts.</div>
          </div>
          <div class="btn-row">
            <button class="btn sm" onclick="AK.toast('Filtered to renewals')">Renewals only</button>
            <button class="btn sm primary" onclick="AKActions.compose({type:'RAISE_RENEWAL_SOW',entityType:'client',entityName:'New pursuit'})">New pursuit</button>
          </div>
        </div>
      </div>

      <div class="pl-metrics" id="pl-metrics"></div>

      <div class="section-label">Pursuit board <span class="faint" style="font-weight:500;text-transform:none;letter-spacing:0">— click a card to act · bench match shown on Skills</span></div>
      <div class="kanban" id="kanban"></div>

    </main>
  </div>
</div>

<script src="data.js"></script>
<script src="actions.js"></script>
<script src="docdrawer.js"></script>
<script src="provenance.js"></script>
<script src="shell.js"></script>
<script src="v3.js"></script>
<script>
const PU=AKData.pursuits;
const STAGES=[['qualify','Qualify'],['propose','Propose'],['negotiate','Negotiate'],['verbal','Verbal / Won']];
const total=PU.reduce((s,p)=>s+p.value,0);
const weighted=PU.reduce((s,p)=>s+p.value*p.prob/100,0);
const renewalVal=PU.filter(p=>p.type==='Renewal').reduce((s,p)=>s+p.value,0);

document.getElementById('pl-metrics').innerHTML=[
  ['Pipeline Coverage','2.4×','target 2.0× · feeds CEO pulse','var(--good)'],
  ['Total Pipeline','₹'+total.toFixed(1)+' Cr',PU.length+' active pursuits','var(--accent-2)'],
  ['Weighted Value','₹'+weighted.toFixed(1)+' Cr','probability-adjusted','var(--composite-2)'],
  ['Renewals in Pipeline','₹'+renewalVal.toFixed(1)+' Cr','protect before expiry','var(--warn)'],
].map(m=>`<div class="pulse-tile"><div class="pt-label">${m[0]}</div><div class="pt-val" style="color:${m[3]}">${m[1]}</div><div style="margin-top:8px"><span class="vs-target near" style="background:var(--surface-2);color:var(--ink-3)">${m[2]}</span></div></div>`).join('');

function probCls(p){return p>=70?'hi':p>=45?'md':'lo';}
function card(p){
  const cl=p.clientById=AKData.clientById(p.clientId);
  const name=p.clientId?(AKData.clientById(p.clientId)?.name||p.name):p.name2;
  const tcls=p.type.replace(' ','');
  return `<div class="pcard t-${tcls}" onclick="act('${p.id}')">
    <div class="pc-name">${p.name}</div>
    <div class="pc-meta"><span class="pc-val">₹${p.value} Cr</span><span class="pc-prob ${probCls(p.prob)}">${p.prob}%</span><span class="ptype">${p.type}</span></div>
    <div class="pc-next">→ ${p.nextStep}</div>
    <div class="pc-foot">${AK.avatar(p.owner,'sm')}<span>${p.owner.split(' ')[0]}</span><span style="margin-left:auto" class="mono">${p.close}</span></div>
  </div>`;
}
document.getElementById('kanban').innerHTML=STAGES.map(([id,label])=>{
  const items=PU.filter(p=>p.stage===id);
  const val=items.reduce((s,p)=>s+p.value,0);
  return `<div class="kcol"><div class="kcol-head"><b>${label}</b><span class="kv">${items.length} · ₹${val.toFixed(1)}Cr</span></div>
    <div class="kcol-body">${items.map(card).join('')}</div></div>`;
}).join('');

window.act=function(id){
  const p=PU.find(x=>x.id===id);
  if(p.type==='Renewal') AKActions.compose({type:'RAISE_RENEWAL_SOW',entityType:'client',entityName:p.name,signal:'renewal',prefill:{client:p.name,value:String(p.value)}});
  else AKActions.compose({type:'ESCALATE',entityType:'portfolio',entityName:p.name,prefill:{subject:p.name,note:p.nextStep}});
};
</script>
</body>
</html>
